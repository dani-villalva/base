    // OPTIMIZACIÓN: Compresión dinámica de imágenes según el caso
    function optimizeImg(url, size = 'w342') {
        if (!url) return '';
        return url.replace(/\/w600_and_h900_face\/|\/w500\/|\/original\//, `/${size}/`);
    }

    function slugify(text) {
        if (!text) return 'untitled';
        return text.toString().toLowerCase().trim()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-');
    }

            return;

            // Reducimos peso de la imagen dinámicamente
            const optImg = optimizeImg(item.img, 'w342');

            // Agregamos estructura de Skeleton y Lazy Load
            return `
            <div class="movie-card" onclick="window.location.href='${link}'">
                <div class="img-wrap skeleton">
                    <div class="card-heart ${favClass}" onclick="toggleFav('${safeTitle}', '${optImg}', event)">
                        <i class="fa ${isFavorite ? 'fa-check' : 'fa-plus'}"></i>
                    </div>
                    <img class="lazy" data-src="${optImg}" decoding="async" alt="${item.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                </div>
                <div class="card-title">${item.title}</div>
            </div>`;
        }).join('');

        updateFavCount();
        initLazy(); // Llamar al observador de imágenes después de inyectar el HTML
    }

    function applyAllFilters() {
        let filtered = database;

        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(d =>
                (d.title && d.title.toLowerCase().includes(term)) ||
                (d.description && d.description.toLowerCase().includes(term)) ||
                (d.year && d.year.toString().includes(term))
            );
        }

        if (currentGenre !== 'all') {
            const lowerGenre = currentGenre.toLowerCase();
            filtered = filtered.filter(d => d.genre && d.genre.toLowerCase().includes(lowerGenre));
        }

        if (currentTag !== 'all') {
            const lowerTag = currentTag.toLowerCase();
            filtered = filtered.filter(d => d.tag && d.tag.toLowerCase() === lowerTag);
        }

        if (currentType !== 'all') {
            filtered = filtered.filter(d => {
                const lowerType = d.type ? d.type.toLowerCase() : '';
                const lowerCat = d.category ? d.category.toLowerCase() : '';
                const isMovie = (lowerType === 'movie' || lowerCat === 'movie' || lowerType === 'pelicula' || lowerCat === 'pelicula');
                if (currentType === 'pelicula') return isMovie;
                if (currentType === 'series') return !isMovie;
                return true;
            });
        }

        // Ejecutar renderización en el siguiente frame para no congelar la pantalla
        requestAnimationFrame(() => renderResults(filtered));
    }

    function filterBy(value, type, el) {
        const siblings = el.parentElement.children;
        for (let btn of siblings) { btn.classList.remove('active'); }
        el.classList.add('active');

        if (type === 'genre') currentGenre = value;
        if (type === 'tag') currentTag = value;
        if (type === 'type') currentType = value;

        applyAllFilters();
    }

    /* --- DEBOUNCE PARA BUSCADOR (Evita congelamientos si escriben rápido) --- */
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    let searchTimeout = null;

    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value.trim();
        clearBtn.style.display = searchTerm ? 'block' : 'none';
        
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            applyAllFilters();
        }, 150); // Espera 150ms después de dejar de escribir para filtrar
    });

    clearBtn.onclick = () => {
        searchInput.value = '';
        searchInput.focus();
        searchTerm = '';
        clearBtn.style.display = 'none';
        applyAllFilters();
    };

    /* --- LAZY LOADING OPTIMIZADO --- */
    let observer = null;
    function initLazy() {
        const imgs = document.querySelectorAll('.lazy:not(.loaded)');
        if(!observer) {
            observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.onload = () => {
                            img.classList.add('loaded');
                            img.closest('.skeleton')?.classList.remove('skeleton');
                        };
                        obs.unobserve(img); // Dejar de observar una vez cargada
                    }
                });
            }, { rootMargin: '400px 0px' }); // Empieza a cargar imágenes 400px antes de hacer scroll
        }
        imgs.forEach(img => observer.observe(img));
    }

    /* --- FAVORITOS --- */
    function getFavs() {
        try { return JSON.parse(localStorage.getItem('myFavs')) || []; }
        catch (e) { return []; }
    }

    function isFav(title) {
        return getFavs().some(f => f.title === title);
    }

    function toggleFav(title, img, e) {
        if (e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            btn.style.transform = "scale(1.3)";
            setTimeout(() => btn.style.transform = "scale(1)", 200);
        }

        let favs = getFavs();
        const index = favs.findIndex(f => f.title === title);

        if (index > -1) favs.splice(index, 1);
        else favs.push({ title, img });

        localStorage.setItem('myFavs', JSON.stringify(favs));

        updateFavCount();
        applyAllFilters();
        if (document.getElementById('favOverlay').style.display === 'flex') showFavorites();
    }

    function updateFavCount() {
        const count = getFavs().length;
        const badge = document.getElementById('favCount');
        badge.innerText = count;
        badge.style.display = count > 0 ? 'block' : 'none';
    }

    function showFavorites() {
        let favs = getFavs();
        const list = document.getElementById('favList');

        if (favs.length === 0) {
            list.innerHTML = `
                <div style="text-align:center; padding:50px 20px; color:var(--text-sec);">
                    <i class="fa fa-bookmark-o" style="font-size:40px; margin-bottom:15px; display:block;"></i>
                    <p style="margin:0; font-size:14px;">Aún no tienes títulos en tu lista.</p>
                </div>`;
        } else {
            list.innerHTML = favs.map(f => {
                // Optimizar imagen miniatura en favoritos
                const optImgMini = optimizeImg(f.img, 'w154');
                return `
                <div class="fav-item" onclick="window.location.href='/ver/${slugify(f.title)}/'">
                    <img src="${optImgMini}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="fav-item-title">${f.title}</div>
                    <div class="fav-item-delete" onclick="toggleFav('${f.title.replace(/'/g, "\\'")}', '', event)">
                        <i class="fa fa-trash"></i>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('favOverlay').style.display = 'flex';
    }

    function closeFavorites() {
        document.getElementById('favOverlay').style.display = 'none';
    }

    // Inicializar app
    updateFavCount();
    renderResults(database);
</script>
</body>
</html>
