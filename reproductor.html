<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reproductor - Minihi Tv</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --bg-base: #0b0e14; --bg-card: #1a1f26; --accent: #00c853; --text-main: #ffffff; --text-sec: #a0a0a0; --border: #2d343e; }
body { background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; }
.player-page-container { width: 100%; max-width: 480px; min-height: 100vh; padding-bottom: 50px; }
.app-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px; }
.sticky-player-wrapper { position: sticky; top: 0; z-index: 1000; background: #000; }
.video-wrapper { position: relative; padding-bottom: 56.25%; background: #000; }
.video-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.main-info-padding { padding: 15px; }
.main-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
.synopsis-text { font-size: 13px; color: #bbb; line-height: 1.6; }
.episode-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
.ep-btn { background: var(--bg-card); aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border); color: #fff; font-weight: bold; cursor: pointer; }
.ep-btn.active { background: #0d1a14; border-color: var(--accent); color: var(--accent); }
.nav-btn { background: var(--bg-card); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; cursor: pointer; margin: 10px; }
.nav-row { display: flex; gap: 10px; padding: 0 5px; }
</style>
</head>
<body>
<div class="player-page-container">
  <div class="app-top-bar"><a href="index.html" style="color:white; text-decoration:none; font-weight:bold;"><i class="fas fa-chevron-left"></i> Volver</a></div>
  <div class="sticky-player-wrapper"><div class="video-wrapper" id="mediaContainer"></div></div>
  <div class="main-info-padding">
    <h1 class="main-title" id="displayTitle">Cargando...</h1>
    <p class="synopsis-text" id="displayDesc"></p>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="navigateEpisode(-1)">Anterior</button>
    <button class="nav-btn" onclick="navigateEpisode(1)">Siguiente</button>
  </div>
  <div class="episode-grid" id="episodeGrid"></div>
</div>

<script>
let EPISODES = [];
let currentIndex = 0;

// Función para convertir título en ID de URL
function slugify(t) {
  return String(t).toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,'');
}

async function cargarDorama() {
  const urlParams = new URLSearchParams(window.location.search);
  const dramaId = urlParams.get('id');
  if (!dramaId) return;

  try {
    const res = await fetch('data.json?v=' + Date.now());
    const data = await res.json();
    const drama = data.find(d => slugify(d.title) === dramaId);

    if (drama) {
      document.getElementById('displayTitle').innerText = drama.title;
      document.getElementById('displayDesc').innerText = drama.description || "";
      EPISODES = drama.episodes || [];
      if(EPISODES.length > 0) changeVideo(0);
    } else {
      document.getElementById('displayTitle').innerText = "No se encontró la serie";
    }
  } catch (e) {
    console.error("Error cargando JSON:", e);
    document.getElementById('displayTitle').innerText = "Error en data.json";
  }
}

function changeVideo(index) {
  if (index < 0 || index >= EPISODES.length) return;
  currentIndex = index;
  const container = document.getElementById('mediaContainer');
  const videoUrl = EPISODES[index].video;
  
  container.innerHTML = `<iframe src="${videoUrl}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  
  // Actualizar botones
  const grid = document.getElementById('episodeGrid');
  grid.innerHTML = "";
  EPISODES.forEach((ep, i) => {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === currentIndex ? ' active' : '');
    btn.innerText = ep.number || (i + 1);
    btn.onclick = () => changeVideo(i);
    grid.appendChild(btn);
  });
}

function navigateEpisode(dir) { changeVideo(currentIndex + dir); }

window.addEventListener('load', cargarDorama);
</script>
</body>
</html>
