<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Minihi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00c853; }
        body { background: #0b0e14; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; text-align: center; }
        .video-box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; margin: 0 auto; }
        iframe { width: 100%; height: 100%; border: none; }
        .info { padding: 20px; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .ep-btn { background: #1a1f26; color: white; border: 1px solid #2d343e; padding: 10px; border-radius: 5px; cursor: pointer; }
        .ep-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .back { display: inline-block; margin: 20px; color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <a href="index.html" class="back">← Volver al Inicio</a>

    <div class="video-box" id="mediaContainer">
        <div style="padding-top: 20%;">Cargando video...</div>
    </div>

    <div class="info">
        <h1 id="displayTitle">Cargando...</h1>
        <p id="displayDesc"></p>
    </div>

    <div class="ep-grid" id="episodeGrid"></div>

    <script>
        let EPISODES = [];

        function slugify(t) {
            return String(t).toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,'');
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            try {
                // Forzamos al navegador a bajar el JSON nuevo con Date.now()
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                const drama = data.find(d => slugify(d.title) === id);

                if (drama) {
                    document.getElementById('displayTitle').innerText = drama.title;
                    document.getElementById('displayDesc').innerText = drama.description;
                    EPISODES = drama.episodes || [];
                    if (EPISODES.length > 0) loadVideo(0);
                } else {
                    document.getElementById('displayTitle').innerText = "Serie no encontrada";
                }
            } catch (e) {
                document.getElementById('displayTitle').innerText = "Error cargando datos";
                console.error(e);
            }
        }

        function loadVideo(index) {
            const container = document.getElementById('mediaContainer');
            const grid = document.getElementById('episodeGrid');
            
            // Cargar Video
            container.innerHTML = `<iframe src="${EPISODES[index].video}" allowfullscreen allow="autoplay"></iframe>`;

            // Cargar Botones
            grid.innerHTML = "";
            EPISODES.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = (i === index) ? 'ep-btn active' : 'ep-btn';
                btn.innerText = ep.number;
                btn.onclick = () => loadVideo(i);
                grid.appendChild(btn);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
