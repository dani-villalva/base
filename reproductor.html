<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reproductor | Minihi Tv</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --bg-base: #0b0e14; --bg-card: #1a1f26; --accent: #00c853; --accent-dim: #0d251a;
  --text-main: #ffffff; --text-sec: #a0a0a0; --border: #2d343e; --btn-bg: #242a32;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
.player-page-container { width: 100%; max-width: 480px; background: var(--bg-base); min-height: 100vh; padding-bottom: 50px; }
.app-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--bg-base); }
.back-link { font-weight: 700; font-size: 14px; display: flex; gap: 8px; align-items: center; color: #fff; }
.top-icons { display: flex; gap: 15px; color: var(--text-sec); font-size: 18px; }
.sticky-player-wrapper { position: sticky; top: 0; z-index: 1000; background: var(--bg-base); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
.video-wrapper { position: relative; padding-bottom: 56.25%; background: #000; }
.video-wrapper iframe, .video-wrapper video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #000; }
.player-toolbar { display: flex; gap: 8px; padding: 10px 15px; }
.tool-btn { flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sec); padding: 8px 5px; border-radius: 6px; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; text-transform: uppercase; }
.scroll-content { padding-top: 10px; }
.main-info-padding { padding: 0 15px; }
.series-eyebrow { font-size: 12px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
.main-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
.meta-tags-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 15px; flex-wrap: wrap; }
.badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
.badge-hd { background: #2d343e; color: #fff; }
.badge-rating { color: #ffca28; font-weight: bold; }
.meta-text { color: var(--text-sec); }
.meta-genre { color: var(--accent); font-weight: 600; text-transform: capitalize; }
.reactions-bar { padding: 5px 15px 20px; display: flex; flex-direction: column; gap: 10px; }
.reaction-label { font-size: 11px; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 1px; }
.emoji-row { display: flex; justify-content: space-between; }
.reaction-btn { background: var(--bg-card); width: 45px; height: 45px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); transition: 0.2s;}
.reaction-btn:active { transform: scale(1.2); background: var(--accent-dim); border-color: var(--accent); }
.synopsis-wrap { padding: 0 15px; margin-bottom: 25px; }
.synopsis-text { font-size: 13px; color: #bbb; line-height: 1.6; }
.ep-nav-top { display: flex; gap: 10px; padding: 0 15px 25px; }
.nav-btn { flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
.nav-btn.active { background: var(--btn-bg); border-color: #3d4653; }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 15px; }
.section-header h2 { font-size: 18px; font-weight: 800; }
.ep-status { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-dim); padding: 4px 10px; border-radius: 12px; }
.episode-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 15px 30px; }
.ep-btn { background: var(--bg-card); aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: var(--text-sec); position: relative; border: 1px solid transparent; }
.ep-btn.active { background: #0d1a14; border-color: #005a26; color: var(--accent); }
.comments-section { padding: 30px 15px; border-top: 1px solid var(--border); }
.comments-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.comment-form { background: var(--bg-card); border-radius: 12px; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px;}
.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.comment-avatar-preview { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-dim); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
.comment-form input, .comment-form textarea { flex: 1; background: var(--bg-base); border: 1px solid var(--border); color: #fff; padding: 12px 15px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; font-family: inherit; }
.comment-form input:focus, .comment-form textarea:focus { border-color: var(--accent); }
.comment-form textarea { height: 80px; resize: none; margin-bottom: 15px; }
.form-footer { display: flex; justify-content: space-between; align-items: center; }
.spoiler-label { font-size: 13px; color: var(--text-sec); display: flex; align-items: center; gap: 8px; }
.submit-btn { background: var(--accent); color: #000; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 13px; }
</style>
</head>
<body>
<div class="player-page-container">
  <div class="app-top-bar">
    <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> Volver</a>
    <div class="top-icons"><i class="fas fa-share-alt" style="cursor:pointer;" onclick="shareURL()"></i></div>
  </div>

  <div class="sticky-player-wrapper">
    <div class="video-wrapper" id="mediaContainer"></div>
    <div class="player-toolbar">
      <button class="tool-btn"><i class="fas fa-moon"></i> Cine</button>
      <button class="tool-btn"><i class="fas fa-clone"></i> Flotante</button>
      <button class="tool-btn"><i class="fas fa-expand-arrows-alt"></i> Full</button>
    </div>
  </div>

  <div class="scroll-content">
    <div class="main-info-padding">
      <p class="series-eyebrow" id="displayType">DRAMA</p>
      <h1 class="main-title" id="displayTitle">Cargando...</h1>
      <div class="meta-tags-row">
        <span class="badge badge-hd">HD</span>
        <span class="badge-rating"><i class="fas fa-star"></i> <span id="displayRate">--</span></span>
        <span class="meta-text" id="displayYear">• ---- •</span>
        <span class="meta-genre" id="displayGenre">Categoría</span>
      </div>
    </div>

    <div class="reactions-bar">
      <span class="reaction-label">Reacciona</span>
      <div class="emoji-row">
          <button class="reaction-btn" onclick="animEmoji(this)">❤️</button>
          <button class="reaction-btn" onclick="animEmoji(this)">🔥</button>
          <button class="reaction-btn" onclick="animEmoji(this)">😭</button>
          <button class="reaction-btn" onclick="animEmoji(this)">🤣</button>
          <button class="reaction-btn" onclick="animEmoji(this)">😱</button>
          <button class="reaction-btn" onclick="animEmoji(this)">🤩</button>
      </div>
    </div>

    <div class="synopsis-wrap"><p class="synopsis-text" id="displayDesc">Cargando...</p></div>

    <div class="ep-nav-top">
      <button class="nav-btn" onclick="navigateEpisode(-1)"><i class="fas fa-chevron-left"></i> Anterior</button>
      <button class="nav-btn active" onclick="navigateEpisode(1)">Siguiente <i class="fas fa-chevron-right"></i></button>
    </div>

    <section>
      <div class="section-header"><h2>Episodios</h2><span class="ep-status" id="displayEpCount">0 EP</span></div>
      <div class="episode-grid" id="episodeGrid"></div>
    </section>

    <section class="comments-section">
      <div class="comments-header"><h3>Comentarios</h3><span id="commentCountLabel">0 total</span></div>
      <div id="commentsList"></div>
    </section>
  </div>
</div>

<script>
let EPISODES = [];
let currentIndex = 0;

function slugify(t) { 
  return String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,''); 
}

async function cargarDorama() {
  const urlParams = new URLSearchParams(window.location.search);
  const dramaId = urlParams.get('id');
  if (!dramaId) return;

  try {
    const res = await fetch('data.json?v=' + Math.random());
    const data = await res.json();
    const drama = data.find(d => slugify(d.title) === dramaId);

    if (drama) {
      document.getElementById('displayTitle').innerText = drama.title;
      document.getElementById('displayType').innerText = (drama.category || 'Drama').toUpperCase();
      document.getElementById('displayRate').innerText = drama.rate || '8.5';
      document.getElementById('displayYear').innerText = '• ' + (drama.year || '2024') + ' •';
      document.getElementById('displayGenre').innerText = drama.genre || 'Drama';
      document.getElementById('displayDesc').innerText = drama.description || '';
      EPISODES = drama.episodes || [];
      document.getElementById('displayEpCount').innerText = EPISODES.length + ' EP';
      if(EPISODES.length > 0) changeVideo(0);
    }
  } catch (e) { console.error(e); }
}

function renderMedia(url){
  const c = document.getElementById('mediaContainer');
  if(!url) return;
  if(url.includes(".mp4") || url.includes(".m3u8")) {
    c.innerHTML = `<video src="${url}" controls autoplay playsinline style="width:100%;height:100%;"></video>`;
  } else {
    c.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  }
}

function renderGrid(){
  const grid = document.getElementById('episodeGrid');
  grid.innerHTML = "";
  EPISODES.forEach((ep, i) => {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === currentIndex ? ' active' : '');
    btn.innerText = ep.number || (i + 1);
    btn.onclick = () => changeVideo(i);
    grid.appendChild(btn);
  });
}

function changeVideo(index){
  if(index < 0 || index >= EPISODES.length) return;
  currentIndex = index;
  renderMedia(EPISODES[index].video);
  renderGrid();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function navigateEpisode(dir) { changeVideo(currentIndex + dir); }
function shareURL() { navigator.clipboard.writeText(window.location.href); alert("Copiado"); }
function animEmoji(btn){ btn.style.transform="scale(1.3)"; setTimeout(()=>btn.style.transform="scale(1)",150); }

window.addEventListener('load', cargarDorama);
</script>
</body>
</html>
