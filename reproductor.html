<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prueba de Diagnóstico | Minihi Tv</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --bg-base: #0b0e14; --bg-card: #1a1f26; --accent: #00c853; --accent-dim: #0d251a;
  --text-main: #ffffff; --text-sec: #a0a0a0; --border: #2d343e; --btn-bg: #242a32;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding-top: 40px;}
.player-page-container { width: 100%; max-width: 480px; padding: 20px; text-align: center;}
.box { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px;}
h1 { color: var(--accent); margin-bottom: 15px; font-size: 20px;}
p { font-size: 14px; color: var(--text-sec); line-height: 1.5; margin-bottom: 10px;}
</style>
</head>
<body>
<div class="player-page-container">
  <div class="box">
    <h1>⚙️ Modo Diagnóstico Activo</h1>
    <p>Si la pantalla se queda aquí, significa que hay un error de Javascript. Revisa las alertas que salen en pantalla.</p>
    <p id="statusLabel" style="color: yellow; font-weight: bold;">Esperando inicio...</p>
  </div>
</div>

<script>
// Función de formateo de nombres
function slugify(t) { 
    return String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,''); 
}

async function iniciarDiagnostico() {
    const status = document.getElementById('statusLabel');
    
    alert("PASO 1: El archivo reproductor.html cargó correctamente en el navegador.");
    
    const urlParams = new URLSearchParams(window.location.search);
    const dramaId = urlParams.get('id');
    
    alert("PASO 2: ID detectado en la URL = " + dramaId);

    if (!dramaId) {
        status.innerText = "Error: Falta el parámetro ?id= en la URL.";
        status.style.color = "red";
        return;
    }

    try {
        status.innerText = "Intentando descargar data.json...";
        alert("PASO 3: Intentando descargar el archivo data.json...");
        
        const respuesta = await fetch('data.json?v=' + Math.random());
        
        alert("PASO 4: Respuesta del servidor recibida. Código de estado = " + respuesta.status);

        if (!respuesta.ok) {
            status.innerText = "Error: El archivo data.json no existe en esta carpeta.";
            status.style.color = "red";
            return;
        }

        status.innerText = "Procesando JSON...";
        const data = await respuesta.json();
        
        alert("PASO 5: Archivo data.json leído con éxito. Total de series encontradas = " + data.length);

        status.innerText = "Buscando la serie en la base de datos...";
        const dramaInfo = data.find(d => slugify(d.title) === dramaId);

        if (dramaInfo) {
            alert("PASO 6: ¡ÉXITO! Encontré la serie '" + dramaInfo.title + "' en tu data.json.");
            status.innerText = "Serie encontrada: " + dramaInfo.title + ". Redirigiendo...";
            status.style.color = "var(--accent)";
            
            // Si todo está bien, te llevará automáticamente al reproductor real
            setTimeout(() => {
                alert("Todo está correcto en tu código. Volviendo al reproductor...");
                // Aquí podrías cargar el código real, pero primero necesitamos ver si llega a este paso.
            }, 1000);

        } else {
            alert("PASO 6: ERROR. No encontré ningún dorama con el nombre '" + dramaId + "' en tu data.json.");
            status.innerText = "Error: No existe '" + dramaId + "' en tu data.json.";
            status.style.color = "red";
        }
        
    } catch (error) {
        console.error(error);
        alert("PASO 3-ERROR: Tu archivo data.json tiene un error de sintaxis (comas o corchetes mal puestos) y el navegador no puede leerlo.");
        status.innerText = "Error: El archivo data.json está roto (Error de sintaxis).";
        status.style.color = "red";
    }
}

// Arranca el diagnóstico
window.addEventListener('load', iniciarDiagnostico);
</script>
</body>
</html>
